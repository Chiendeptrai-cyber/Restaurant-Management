services:
  product-db:
    image: mongo:6.0
    container_name: textfood_product_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: product_db
    volumes:
      - product_db_data:/data/db
    ports:
      - '27017:27017'

  order-db:
    image: mongo:6.0
    container_name: textfood_order_db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: order_db
    volumes:
      - order_db_data:/data/db
    ports:
      - '27018:27017'

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: textfood_product_service
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://product-db:27017/product_db
      - CORS_ORIGIN=*
    depends_on:
      - product-db

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: textfood_order_service
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://order-db:27017/order_db
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - CORS_ORIGIN=*
    depends_on:
      - order-db
      - product-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: textfood_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - product-service
      - order-service

volumes:
  product_db_data:
  order_db_data:
